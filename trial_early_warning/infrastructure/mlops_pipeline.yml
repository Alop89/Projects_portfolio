name: ArchData Clinical MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  integration-and-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Instalamos los requerimientos y las herramientas de testing
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Pytest (Testing Framework)
        run: |
          pytest tests/ -p no:cacheprovider

  build-and-package:

    needs: integration-and-testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image

        run: |
          docker build -t archdata/clinical-oracle:latest .
